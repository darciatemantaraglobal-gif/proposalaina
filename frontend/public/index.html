<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#03020a" />
    <meta name="description" content="AINA - Asisten Cerdas untuk Masisir. Bantu urus administrasi, akademik, dan kehidupan sehari-hari di Mesir." />
    <title>AINA | Asisten Cerdas Masisir</title>

    <!-- Preconnect for fonts and external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://wa.me" />
    <link rel="preconnect" href="https://ainalabs.pro" />

    <!-- Non-blocking font load: preload then swap to all -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&display=swap"
      />
    </noscript>

    <!-- Preload critical hero image -->
    <link rel="preload" as="image" href="/aina-hero.webp" type="image/webp" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
